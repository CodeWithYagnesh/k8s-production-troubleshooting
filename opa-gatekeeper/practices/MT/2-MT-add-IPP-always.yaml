apiVersion: mutations.gatekeeper.sh/v1
kind: Assign
metadata:
  name: add-ipp-always
spec:
  applyTo:
  - groups: [""]
    kinds: ["Pod"]
    versions: ["v1"]
  match:
    scope: Namespaced
    kinds:
    - apiGroups: ["*"]
      kinds: ["Pod"]
    namespaces: ["default"]
  location: "spec.containers[name: *].imagePullPolicy"
  parameters:
    assign:
      value: Always
