apiVersion: v1
kind: Namespace
metadata:
  name:  opa-exporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opa-exporter
rules:
  - apiGroups:
      - constraints.gatekeeper.sh
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opa-exporter-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opa-exporter
subjects:
  - kind: ServiceAccount
    name: default
    namespace: opa-exporter

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: opa-exporter
  name: opa-exporter
  namespace: opa-exporter

spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa-exporter
  strategy: {}
  template:
    metadata:
      labels:
        app: opa-exporter
    spec:
      containers:
        - image: mcelep/opa_scorecard_exporter:v0.0.3
          name: opa-scorecard-exporter-ldscm
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 9141
              protocol: TCP
              name: metrics
---
